name: Build metrics image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  bake-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Docker Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set tags
        id: tags
        run: |
          if [[ ${{ github.ref }} == refs/tags/* ]]; then
            VERSION_TAG=${{ github.ref_name }}
            echo "tags=ahpooch/py-kms-metrics:${VERSION_TAG},ahpooch/py-kms-metrics:latest" >> $GITHUB_OUTPUT
          else
            echo "tags=ahpooch/py-kms-metrics:main" >> $GITHUB_OUTPUT
          fi
      - name: Build and push (metrics)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/docker-py3-kms-metrics/Dockerfile
          platforms: linux/amd64
          # linux/arm64,linux/386,/v8,linux/arm/v7,linux/arm/v6
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            BUILD_REFERENCE=${{ github.ref_name }}
